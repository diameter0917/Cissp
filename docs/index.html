<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CISSP 每日電子報 · 追蹤索引</title>
<style>
  :root{
    --navy:#15233B; --bg:#ECEFF3; --card:#FFFFFF; --border:#E2E5EA;
    --muted:#5B6675; --p1:#0E7C7B; --p2:#3D52A0; --p3:#B45309;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:#2A3340;
    font-family:-apple-system,'PingFang TC','Microsoft JhengHei','Noto Sans TC',sans-serif;}
  .wrap{max-width:1000px; margin:0 auto; padding:18px 14px 60px;}
  header{background:var(--navy); color:#fff; border-radius:14px; padding:20px 22px; margin-bottom:16px;}
  header .kicker{font-family:'SFMono-Regular',Consolas,Menlo,monospace; font-size:11px; letter-spacing:2px; color:#8FA0B6; text-transform:uppercase;}
  header h1{margin:8px 0 4px; font-size:21px;}
  header p{margin:0; font-size:13px; color:#C7D2E0;}
  .progress-wrap{margin-top:14px;}
  .progress-bar{height:10px; background:#2A3A55; border-radius:6px; overflow:hidden;}
  .progress-fill{height:10px; width:0; background:var(--p1); transition:width .4s;}
  .progress-text{font-size:12.5px; color:#C7D2E0; margin-top:6px; font-family:'SFMono-Regular',Consolas,Menlo,monospace;}
  .controls{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; align-items:center;}
  .group{display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
  .group .label{font-size:12px; color:var(--muted); margin-right:2px;}
  .chip{border:1px solid var(--border); background:var(--card); color:#3A4658; font-size:12.5px;
    padding:5px 11px; border-radius:20px; cursor:pointer; user-select:none;}
  .chip.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .chip.p1.active{background:var(--p1); border-color:var(--p1);}
  .chip.p2.active{background:var(--p2); border-color:var(--p2);}
  .chip.p3.active{background:var(--p3); border-color:var(--p3);}
  #search{flex:1; min-width:160px; padding:8px 12px; border:1px solid var(--border);
    border-radius:8px; font-size:14px; background:var(--card);}
  table{width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--border);
    border-radius:12px; overflow:hidden; font-size:13.5px;}
  thead th{background:#F4F6F9; color:var(--muted); text-align:left; padding:10px 10px; font-weight:600;
    font-size:12px; text-transform:uppercase; letter-spacing:.5px; position:sticky; top:0;}
  tbody td{padding:9px 10px; border-top:1px solid #EEF0F3; vertical-align:middle;}
  tbody tr:hover{background:#FAFBFC;}
  .seq{font-family:'SFMono-Regular',Consolas,Menlo,monospace; color:#9AA6B4; font-size:12px;}
  .tag{display:inline-block; font-size:11.5px; font-weight:700; padding:2px 8px; border-radius:5px; color:#fff; white-space:nowrap;}
  .tag.p1{background:var(--p1);} .tag.p2{background:var(--p2);} .tag.p3{background:var(--p3);}
  .tag.dom{background:#5B6675;}
  .code{font-family:'SFMono-Regular',Consolas,Menlo,monospace; font-size:12px; color:#3A4658;}
  .title{font-weight:600;}
  .title small{display:block; color:#9AA6B4; font-weight:400; font-size:11.5px; font-style:italic;}
  .status-sent{color:#0A8A3A; font-weight:700;}
  .status-pending{color:#B8C0CC;}
  .open{color:var(--p1); text-decoration:none; font-weight:600; font-size:12.5px; white-space:nowrap;}
  .open.disabled{color:#C0C7D0; pointer-events:none;}
  .meta{font-size:12px; color:var(--muted); margin:4px 2px 10px;}
  .hide{display:none !important;}
  .empty{padding:30px; text-align:center; color:var(--muted);}
  @media(max-width:640px){
    .col-en,.col-date{display:none;}
    thead th, tbody td{padding:8px 6px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">CISSP 每日電子報 · 追蹤索引</div>
    <h1>螺旋式三階段 · 120 封 · 24 週</h1>
    <p>初期建立輪廓 → 中期深入細節 → 後期聚焦考點。平日每天一封，週末休息。</p>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
      <div class="progress-text" id="ptext">載入中…</div>
    </div>
  </header>

  <div class="controls">
    <div class="group">
      <span class="label">階段</span>
      <span class="chip active" data-phase="all">全部</span>
      <span class="chip p1" data-phase="P1">初期</span>
      <span class="chip p2" data-phase="P2">中期</span>
      <span class="chip p3" data-phase="P3">後期</span>
    </div>
    <div class="group">
      <span class="label">Domain</span>
      <span class="chip active" data-domain="all">全部</span>
      <span class="chip" data-domain="D1">D1</span>
      <span class="chip" data-domain="D2">D2</span>
      <span class="chip" data-domain="D3">D3</span>
      <span class="chip" data-domain="D4">D4</span>
      <span class="chip" data-domain="D5">D5</span>
      <span class="chip" data-domain="D6">D6</span>
      <span class="chip" data-domain="D7">D7</span>
      <span class="chip" data-domain="D8">D8</span>
    </div>
  </div>
  <div class="controls">
    <input id="search" type="search" placeholder="搜尋中英文標題 / 代碼…" autocomplete="off">
  </div>
  <div class="meta" id="countMeta"></div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th class="col-date">日期</th>
        <th>階段</th>
        <th>Domain</th>
        <th>代碼</th>
        <th>標題</th>
        <th>狀態</th>
        <th>重看</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty hide" id="empty">沒有符合條件的單元。</div>
</div>

<script>
const PHASE_ZH = {P1:'初期', P2:'中期', P3:'後期'};
let ITEMS = [], SENT = new Set();
let fPhase = 'all', fDomain = 'all', fQuery = '';

function esc(s){ return (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

async function load(){
  try{
    const [sch, log] = await Promise.all([
      fetch('schedule.json').then(r=>r.json()),
      fetch('sent_log.json').then(r=>r.ok?r.json():[]).catch(()=>[])
    ]);
    ITEMS = sch.items || [];
    SENT = new Set((log||[]).filter(r=>r.status==='sent').map(r=>r.seq));
  }catch(e){
    document.getElementById('ptext').textContent = '無法載入 schedule.json';
    return;
  }
  render();
}

function passFilter(it){
  if(fPhase!=='all' && it.phase!==fPhase) return false;
  if(fDomain!=='all' && it.domain!==fDomain) return false;
  if(fQuery){
    const q = fQuery.toLowerCase();
    const hay = (it.title_zh+' '+it.title_en+' '+it.code).toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

function render(){
  const rows = document.getElementById('rows');
  const list = ITEMS.filter(passFilter);
  rows.innerHTML = list.map(it=>{
    const sent = SENT.has(it.seq);
    const pcls = it.phase.toLowerCase();
    return `<tr>
      <td class="seq">${it.seq}</td>
      <td class="col-date seq">${esc(it.date)}</td>
      <td><span class="tag ${pcls}">${PHASE_ZH[it.phase]||it.phase}</span></td>
      <td><span class="tag dom">${esc(it.domain)}</span></td>
      <td class="code">${esc(it.code)}</td>
      <td class="title">${esc(it.title_zh)}<small class="col-en">${esc(it.title_en)}</small></td>
      <td>${sent?'<span class="status-sent">✅ 已寄</span>':'<span class="status-pending">⬜ 未寄</span>'}</td>
      <td><a class="open" href="${esc(it.archive_url)}">開啟 ↗</a></td>
    </tr>`;
  }).join('');

  document.getElementById('empty').classList.toggle('hide', list.length>0);
  document.getElementById('countMeta').textContent =
    `顯示 ${list.length} / ${ITEMS.length} 封` + (fPhase!=='all'||fDomain!=='all'||fQuery?'（已篩選）':'');

  const sentCount = ITEMS.filter(it=>SENT.has(it.seq)).length;
  const pct = ITEMS.length ? Math.round(sentCount/ITEMS.length*100) : 0;
  document.getElementById('pfill').style.width = pct+'%';
  document.getElementById('ptext').textContent = `已寄送 ${sentCount} / ${ITEMS.length} 封（${pct}%）`;
}

document.querySelectorAll('.chip[data-phase]').forEach(c=>{
  c.addEventListener('click', ()=>{
    document.querySelectorAll('.chip[data-phase]').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); fPhase = c.dataset.phase; render();
  });
});
document.querySelectorAll('.chip[data-domain]').forEach(c=>{
  c.addEventListener('click', ()=>{
    document.querySelectorAll('.chip[data-domain]').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); fDomain = c.dataset.domain; render();
  });
});
document.getElementById('search').addEventListener('input', e=>{ fQuery = e.target.value.trim(); render(); });

load();
</script>
</body>
</html>
